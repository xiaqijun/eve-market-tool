{% extends "base.html" %}
{% block title %}价格提醒 · EVE 终端{% endblock %}

{% block content %}

<h1>价格提醒终端</h1>
<p style="font-family:var(--font-mono);font-size:0.8rem;color:var(--text-dim);margin-top:-0.5rem;margin-bottom:1.5rem;">
    设置物品价格阈值，高于或低于时自动标记触发
</p>

<div x-data="alertsApp()" x-init="loadAlerts()">

<!-- ====== Create Alert ====== -->
<h2>◈ 新建提醒</h2>
<form @submit.prevent="createAlert" style="position:relative;">
    <div class="grid">
        <label>
            物品名称
            <div style="position:relative;">
                <input type="text" placeholder="搜索物品..." autocomplete="off"
                       x-model="itemQuery" @input.debounce.200ms="searchItem"
                       @focus="if(itemResults.length) itemOpen = true"
                       @keydown.escape="itemOpen = false">
                <div x-show="itemOpen && itemResults.length" @click.outside="itemOpen = false"
                     style="position:absolute;top:100%;left:0;right:0;z-index:60;
                            background:var(--bg-card);border:1px solid var(--border-accent);
                            border-radius:var(--radius-sm);max-height:200px;overflow-y:auto;
                            box-shadow:0 8px 24px rgba(0,0,0,0.5);">
                    <template x-for="item in itemResults" :key="item.type_id">
                        <div @click="selectItem(item)" style="padding:0.45rem 0.7rem;cursor:pointer;
                                    border-bottom:1px solid var(--border-subtle);"
                             @mouseenter="$el.style.background='var(--bg-hover)'"
                             @mouseleave="$el.style.background='transparent'">
                            <span x-text="item.name" style="font-size:0.85rem;"></span>
                            <span x-text="'ID:'+item.type_id" style="font-size:0.65rem;color:var(--text-dim);margin-left:0.5rem;"></span>
                        </div>
                    </template>
                </div>
            </div>
            <span x-show="selectedName" style="color:var(--gold);font-size:0.7rem;" x-text="'已选: ' + selectedName"></span>
        </label>
        <label>
            星域
            <select x-model="form.region_id">
                <option value="10000002">Jita · The Forge</option>
                <option value="10000043">Amarr · Domain</option>
                <option value="10000032">Dodixie · Sinq Laison</option>
                <option value="10000030">Rens · Heimatar</option>
                <option value="10000042">Hek · Metropolis</option>
            </select>
        </label>
        <label>
            触发条件
            <select x-model="form.condition">
                <option value="above">价格高于</option>
                <option value="below">价格低于</option>
            </select>
        </label>
        <label>
            阈值 ISK
            <input type="number" x-model="form.threshold" step="0.01" min="0" placeholder="触发价格">
        </label>
        <button type="submit" style="align-self:flex-end;" :disabled="!canCreate">
            创建提醒
        </button>
    </div>
    <p x-show="error" x-text="error" style="color:var(--loss);font-size:0.75rem;"></p>
</form>

<!-- ====== Active Alerts ====== -->
<h2>◈ 活跃提醒</h2>
<div class="overflow-auto">
    <table>
        <thead>
            <tr>
                <th>物品</th>
                <th>星域</th>
                <th>条件</th>
                <th>阈值</th>
                <th>当前价格</th>
                <th>上次触发</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody>
            <template x-for="a in alerts" :key="a.id">
                <tr :style="a.is_active?'':'opacity:0.4'">
                    <td>
                        <span x-text="a.type_id" style="font-family:var(--font-mono);font-size:0.7rem;color:var(--text-dim);"></span>
                    </td>
                    <td x-text="regionName(a.region_id)"></td>
                    <td>
                        <span x-text="a.condition==='above'?'▴ 高于':'▾ 低于'"
                              :style="'color:'+(a.condition==='above'?'var(--profit)':'var(--loss)')"></span>
                    </td>
                    <td x-text="formatISK(a.threshold)"></td>
                    <td>
                        <span x-text="a.current_price ? formatISK(a.current_price) : '...'"
                              style="color:var(--gold);"
                              x-show="a.current_price"></span>
                        <span x-show="!a.current_price" style="color:var(--text-dim);">加载中</span>
                    </td>
                    <td x-text="a.last_triggered ? a.last_triggered.slice(0,19).replace('T',' ') : '—'"
                        style="font-size:0.7rem;"></td>
                    <td style="display:flex;gap:0.25rem;">
                        <button @click="toggleAlert(a)" style="font-size:0.6rem;padding:0.2rem 0.5rem;"
                                x-text="a.is_active ? '停用' : '启用'"></button>
                        <button @click="deleteAlert(a.id)" style="font-size:0.6rem;padding:0.2rem 0.5rem;
                                color:var(--loss);border-color:var(--loss);">删除</button>
                    </td>
                </tr>
            </template>
            <tr x-show="!alerts.length">
                <td colspan="7" style="text-align:center;color:var(--text-dim);padding:2rem;">
                    暂无价格提醒 — 在上方创建第一个
                </td>
            </tr>
        </tbody>
    </table>
</div>

</div>
{% endblock %}
