{% extends "base.html" %}
{% block title %}制造分析 · EVE 终端{% endblock %}

{% block content %}

<h1>制造利润分析</h1>
<p style="font-family:var(--font-mono);font-size:0.8rem;color:var(--text-dim);margin-top:-0.5rem;margin-bottom:1.5rem;">
    蓝图材料成本对比市场售价，找到最赚钱的制造项目
</p>

<!-- Analysis Form -->
<h2>◈ 蓝图分析</h2>
<form hx-post="/api/v1/manufacturing/analyze" hx-target="#analysis-result" hx-swap="innerHTML"
      x-data="itemPicker()">
    <input type="hidden" name="blueprint_type_id" x-model="selectedId">
    <div class="grid">
        <label>
            蓝图名称
            <div style="position:relative;">
                <input type="text" placeholder="输入蓝图名称搜索..." autocomplete="off"
                       x-model="query" @input.debounce.200ms="search"
                       @focus="if(results.length) open = true"
                       @keydown.escape="open = false">
                <div x-show="open && results.length" @click.outside="open = false"
                     style="position:absolute;top:100%;left:0;right:0;z-index:50;
                            background:var(--bg-card);border:1px solid var(--border-accent);
                            border-radius:var(--radius-sm);max-height:260px;overflow-y:auto;
                            box-shadow:0 8px 24px rgba(0,0,0,0.5);">
                    <template x-for="item in results" :key="item.type_id">
                        <div @click="select(item)" style="padding:0.5rem 0.75rem;cursor:pointer;
                                    border-bottom:1px solid var(--border-subtle);
                                    display:flex;justify-content:space-between;align-items:center;"
                             @mouseenter="$el.style.background='var(--bg-hover)'"
                             @mouseleave="$el.style.background='transparent'">
                            <span x-text="item.name" style="font-family:var(--font-body);font-size:0.9rem;color:var(--text-primary);"></span>
                            <span x-text="item.type_id" style="font-family:var(--font-mono);font-size:0.7rem;color:var(--text-dim);"></span>
                        </div>
                    </template>
                </div>
                <div x-show="loading" style="position:absolute;top:100%;left:0;right:0;z-index:50;
                         background:var(--bg-card);border:1px solid var(--border-accent);
                         border-radius:var(--radius-sm);padding:0.75rem;text-align:center;
                         color:var(--text-dim);font-family:var(--font-mono);font-size:0.8rem;">
                    搜索中...
                </div>
                <div x-show="open && !loading && query && !results.length"
                     style="position:absolute;top:100%;left:0;right:0;z-index:50;
                            background:var(--bg-card);border:1px solid var(--border-subtle);
                            border-radius:var(--radius-sm);padding:0.75rem;text-align:center;
                            color:var(--text-dim);font-family:var(--font-mono);font-size:0.8rem;">
                    未找到匹配物品
                </div>
            </div>
            <span x-show="selectedName" x-text="'已选: ' + selectedName" style="color:var(--gold);font-size:0.75rem;margin-top:0.25rem;"></span>
        </label>
        <label>
            定价星域
            <select name="region_id">
                <option value="10000002">Jita · The Forge</option>
                <option value="10000043">Amarr · Domain</option>
                <option value="10000032">Dodixie · Sinq Laison</option>
                <option value="10000030">Rens · Heimatar</option>
                <option value="10000042">Hek · Metropolis</option>
            </select>
        </label>
        <label>
            生产数量
            <input type="number" name="quantity" value="1" min="1">
        </label>
        <label>
            设施税率 %
            <input type="number" name="facility_tax" value="0" min="0" step="0.1">
        </label>
        <button type="submit" style="align-self:flex-end;" :disabled="!selectedId">执行分析</button>
    </div>
</form>

<div id="analysis-result"></div>

<!-- Top Manufacturing -->
<h2>◈ 最佳制造项目</h2>
<form hx-get="/api/v1/manufacturing/top" hx-target="#top-manufacturing" hx-trigger="submit, load delay:100ms">
    <div class="grid">
        <label>
            星域
            <select name="region_id">
                <option value="10000002">Jita · The Forge</option>
                <option value="10000043">Amarr · Domain</option>
                <option value="10000032">Dodixie · Sinq Laison</option>
                <option value="10000030">Rens · Heimatar</option>
                <option value="10000042">Hek · Metropolis</option>
            </select>
        </label>
        <button type="submit" style="align-self:flex-end;">加载排行</button>
    </div>
</form>

<div id="top-manufacturing" class="overflow-auto">
    <p aria-busy="true">加载制造数据中...</p>
</div>

<!-- Price Trend -->
<h2>◈ 价格趋势图</h2>
<form hx-get="/api/v1/dashboard/trends/0/chart" hx-target="#chart-container" hx-swap="innerHTML"
      x-data="itemPicker()"
      @submit="if (!selectedId) { $event.preventDefault(); return; }
               $el.setAttribute('hx-get', '/api/v1/dashboard/trends/' + selectedId + '/chart?region_id=' + $el.querySelector('select').value)">
    <div class="grid">
        <label>
            物品名称
            <div style="position:relative;">
                <input type="text" placeholder="搜索物品名称..." autocomplete="off"
                       x-model="query" @input.debounce.200ms="search"
                       @focus="if(results.length) open = true"
                       @keydown.escape="open = false">
                <div x-show="open && results.length" @click.outside="open = false"
                     style="position:absolute;top:100%;left:0;right:0;z-index:50;
                            background:var(--bg-card);border:1px solid var(--border-accent);
                            border-radius:var(--radius-sm);max-height:260px;overflow-y:auto;
                            box-shadow:0 8px 24px rgba(0,0,0,0.5);">
                    <template x-for="item in results" :key="item.type_id">
                        <div @click="select(item)" style="padding:0.5rem 0.75rem;cursor:pointer;
                                    border-bottom:1px solid var(--border-subtle);
                                    display:flex;justify-content:space-between;align-items:center;"
                             @mouseenter="$el.style.background='var(--bg-hover)'"
                             @mouseleave="$el.style.background='transparent'">
                            <span x-text="item.name" style="font-family:var(--font-body);font-size:0.9rem;color:var(--text-primary);"></span>
                            <span x-text="item.type_id" style="font-family:var(--font-mono);font-size:0.7rem;color:var(--text-dim);"></span>
                        </div>
                    </template>
                </div>
                <div x-show="loading" style="position:absolute;top:100%;left:0;right:0;z-index:50;
                         background:var(--bg-card);border:1px solid var(--border-accent);
                         border-radius:var(--radius-sm);padding:0.75rem;text-align:center;
                         color:var(--text-dim);font-family:var(--font-mono);font-size:0.8rem;">
                    搜索中...
                </div>
                <div x-show="open && !loading && query && !results.length"
                     style="position:absolute;top:100%;left:0;right:0;z-index:50;
                            background:var(--bg-card);border:1px solid var(--border-subtle);
                            border-radius:var(--radius-sm);padding:0.75rem;text-align:center;
                            color:var(--text-dim);font-family:var(--font-mono);font-size:0.8rem;">
                    未找到匹配物品
                </div>
            </div>
            <span x-show="selectedName" x-text="'已选: ' + selectedName" style="color:var(--gold);font-size:0.75rem;margin-top:0.25rem;"></span>
        </label>
        <label>
            星域
            <select name="region_id">
                <option value="10000002">Jita</option>
                <option value="10000043">Amarr</option>
                <option value="10000032">Dodixie</option>
                <option value="10000030">Rens</option>
                <option value="10000042">Hek</option>
            </select>
        </label>
        <button type="submit" style="align-self:flex-end;" :disabled="!selectedId">生成图表</button>
    </div>
</form>
<div id="chart-container">
    <canvas id="priceChart" style="max-height:400px"></canvas>
</div>

{% endblock %}
